<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaceAuth — Démo SDK</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 60px auto;
      padding: 0 20px;
      color: #1a1a1a;
    }
    h1 { font-size: 22px; }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-enroll {
      background: #2563eb;
      color: white;
    }
    .btn-verify {
      background: #18181b;
      color: white;
    }
    #result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 10px;
      background: #f4f4f5;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    #result.show { display: block; }
  </style>
</head>
<body>
  <h1>🔐 FaceAuth — Démo SDK</h1>
  <p style="color:#666; font-size:14px;">
    Cette page teste le SDK contre votre backend local
    (<code>http://localhost:8000</code>).
  </p>

  <div class="field">
    <label>Clé API (sk_live_... ou sk_test_...)</label>
    <input id="apiKey" type="text" placeholder="sk_live_xxxxxxxxxxxx" />
  </div>

  <div class="field">
    <label>ID utilisateur final</label>
    <input id="endUserId" type="text" value="demo_user_001" />
  </div>

  <div class="buttons">
    <button class="btn-enroll" id="btnEnroll">📷 Enrôler</button>
    <button class="btn-verify" id="btnVerify">✅ Vérifier</button>
  </div>

  <pre id="result"></pre>

  <!-- Le SDK doit être construit au préalable : npm run build -->
  <script src="../../dist/faceauth.js"></script>
  <script>
    const resultEl = document.getElementById("result");

    function showResult(result) {
      resultEl.classList.add("show");
      resultEl.textContent = JSON.stringify(result, null, 2);
    }

    function getClient() {
      const apiKey = document.getElementById("apiKey").value.trim();
      if (!apiKey) {
        alert("Entrez une clé API d'abord");
        return null;
      }
      return new FaceAuth.FaceAuth({
        apiKey,
        apiBaseUrl: "http://localhost:8000",
        theme: "auto",
      });
    }

    document.getElementById("btnEnroll").addEventListener("click", async () => {
      const client = getClient();
      if (!client) return;
      const endUserId = document.getElementById("endUserId").value.trim();
      const result = await client.enroll({ endUserId });
      showResult(result);
    });

    document.getElementById("btnVerify").addEventListener("click", async () => {
      const client = getClient();
      if (!client) return;
      const endUserId = document.getElementById("endUserId").value.trim();
      const result = await client.verify({ endUserId });
      showResult(result);
    });
  </script>
</body>
</html>
