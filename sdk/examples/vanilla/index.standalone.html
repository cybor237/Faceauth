<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaceAuth — Démo SDK</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 60px auto;
      padding: 0 20px;
      color: #1a1a1a;
    }
    h1 { font-size: 22px; }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-enroll {
      background: #2563eb;
      color: white;
    }
    .btn-verify {
      background: #18181b;
      color: white;
    }
    #result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 10px;
      background: #f4f4f5;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    #result.show { display: block; }
  </style>
</head>
<body>
  <h1>🔐 FaceAuth — Démo SDK</h1>
  <p style="color:#666; font-size:14px;">
    Cette page teste le SDK contre votre backend local
    (<code>http://localhost:8000</code>).
  </p>

  <div class="field">
    <label>Clé API (sk_live_... ou sk_test_...)</label>
    <input id="apiKey" type="text" placeholder="sk_live_xxxxxxxxxxxx" />
  </div>

  <div class="field">
    <label>ID utilisateur final</label>
    <input id="endUserId" type="text" value="demo_user_001" />
  </div>

  <div class="buttons">
    <button class="btn-enroll" id="btnEnroll">📷 Enrôler</button>
    <button class="btn-verify" id="btnVerify">✅ Vérifier</button>
  </div>

  <pre id="result"></pre>

:host {
  all: initial;
}

* {
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* ============================================================
   TH\xC8ME \u2014 variables CSS, claires par d\xE9faut, sombres via [data-theme]
   ============================================================ */
.fa-root {
  --fa-bg: #ffffff;
  --fa-text: #1a1a1a;
  --fa-text-secondary: #6b6b6b;
  --fa-border-idle: #e0e0e0;
  --fa-border-active: #22c55e;
  --fa-accent: #2563eb;
  --fa-danger: #ef4444;
  --fa-overlay-bg: rgba(0, 0, 0, 0.55);
  --fa-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
}

.fa-root[data-theme="dark"] {
  --fa-bg: #18181b;
  --fa-text: #f4f4f5;
  --fa-text-secondary: #a1a1aa;
  --fa-border-idle: #3f3f46;
  --fa-border-active: #4ade80;
  --fa-accent: #3b82f6;
  --fa-danger: #f87171;
  --fa-overlay-bg: rgba(0, 0, 0, 0.7);
  --fa-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

/* ============================================================
   OVERLAY \u2014 fond assombri derri\xE8re la modale/bottom-sheet
   ============================================================ */
.fa-overlay {
  position: fixed;
  inset: 0;
  background: var(--fa-overlay-bg);
  z-index: 2147483000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 250ms ease;
}

.fa-overlay.fa-visible {
  opacity: 1;
}

/* ============================================================
   DESKTOP \u2014 modale centr\xE9e
   ============================================================ */
.fa-panel {
  background: var(--fa-bg);
  color: var(--fa-text);
  border-radius: 20px;
  box-shadow: var(--fa-shadow);
  width: 420px;
  max-width: 92vw;
  padding: 28px;
  position: relative;
  transform: scale(0.96);
  opacity: 0;
  transition: transform 250ms ease, opacity 250ms ease;
}

.fa-overlay.fa-visible .fa-panel {
  transform: scale(1);
  opacity: 1;
}

/* ============================================================
   MOBILE \u2014 bottom-sheet (\u2264 640px)
   ============================================================ */
@media (max-width: 640px) {
  .fa-overlay {
    align-items: flex-end;
  }

  .fa-panel {
    width: 100%;
    max-width: 100%;
    border-radius: 24px 24px 0 0;
    height: 85vh;
    max-height: 85vh;
    transform: translateY(100%);
    opacity: 1;
    display: flex;
    flex-direction: column;
    transition: transform 300ms cubic-bezier(0.32, 0.72, 0, 1);
  }

  .fa-overlay.fa-visible .fa-panel {
    transform: translateY(0);
  }

  .fa-camera-wrapper {
    flex: 1;
  }
}

/* ============================================================
   En-t\xEAte : bouton Annuler
   ============================================================ */
.fa-header {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 8px;
}

.fa-cancel-btn {
  background: transparent;
  border: none;
  color: var(--fa-text-secondary);
  font-size: 14px;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  transition: background 150ms ease;
}

.fa-cancel-btn:hover {
  background: var(--fa-border-idle);
}

/* ============================================================
   Titre / instructions
   ============================================================ */
.fa-title {
  font-size: 18px;
  font-weight: 600;
  margin: 0 0 4px;
  text-align: center;
}

.fa-subtitle {
  font-size: 14px;
  color: var(--fa-text-secondary);
  text-align: center;
  margin: 0 0 20px;
  min-height: 20px;
}

/* ============================================================
   Zone cam\xE9ra avec bordures progressives (4 c\xF4t\xE9s = 4 gestes)
   ============================================================ */
.fa-camera-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 16px;
  overflow: hidden;
  background: #000;
}

.fa-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1); /* Effet miroir, plus naturel pour l'utilisateur */
}

.fa-ghost-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
}

.fa-ghost-svg {
  width: 60%;
  height: 80%;
  opacity: 0.35;
}

/* Bordures progressives \u2014 une par geste, s'allument en vert au fur et \xE0 mesure */
.fa-border {
  position: absolute;
  background: var(--fa-border-idle);
  transition: background 200ms ease, box-shadow 200ms ease;
}

.fa-border.fa-active {
  background: var(--fa-border-active);
  box-shadow: 0 0 12px var(--fa-border-active);
}

.fa-border-top    { top: 0; left: 0; right: 0; height: 5px; }
.fa-border-right  { top: 0; right: 0; bottom: 0; width: 5px; }
.fa-border-bottom { bottom: 0; left: 0; right: 0; height: 5px; }
.fa-border-left   { top: 0; left: 0; bottom: 0; width: 5px; }

/* ============================================================
   Message d'erreur sous le scan
   ============================================================ */
.fa-error-message {
  text-align: center;
  font-size: 13px;
  color: var(--fa-danger);
  margin-top: 12px;
  min-height: 18px;
}

/* ============================================================
   \xC9tats : chargement, succ\xE8s, \xE9chec
   ============================================================ */
.fa-status-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  gap: 12px;
}

.fa-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--fa-border-idle);
  border-top-color: var(--fa-accent);
  border-radius: 50%;
  animation: fa-spin 0.8s linear infinite;
}

@keyframes fa-spin {
  to { transform: rotate(360deg); }
}

.fa-status-icon {
  font-size: 40px;
  line-height: 1;
}

.fa-status-title {
  font-size: 16px;
  font-weight: 600;
  margin: 0;
}

.fa-status-text {
  font-size: 13px;
  color: var(--fa-text-secondary);
  margin: 0;
}

</script>
<script>
  const resultEl = document.getElementById("result");

  function showResult(result) {
    resultEl.classList.add("show");
    resultEl.textContent = JSON.stringify(result, null, 2);
  }

  function showRawError(err) {
    resultEl.classList.add("show");
    resultEl.style.color = "#dc2626";
    resultEl.textContent = "ERREUR JS : " + (err?.message || err);
  }

  function getClient() {
    const apiKey = document.getElementById("apiKey").value.trim();
    if (!apiKey) {
      showRawError("Champ clé API vide — collez votre clé sk_live_... avant de cliquer");
      return null;
    }
    if (typeof FaceAuth === "undefined") {
      showRawError("Le SDK ne s'est pas chargé (faceauth.js introuvable ou erreur de build)");
      return null;
    }
    return new FaceAuth.FaceAuth({
      apiKey,
      apiBaseUrl: "",
      theme: "auto",
    });
  }

  document.getElementById("btnEnroll").addEventListener("click", async () => {
    try {
      const client = getClient();
      if (!client) return;
      const endUserId = document.getElementById("endUserId").value.trim();
      const result = await client.enroll({ endUserId });
      showResult(result);
    } catch (err) {
      showRawError(err);
    }
  });

  document.getElementById("btnVerify").addEventListener("click", async () => {
    try {
      const client = getClient();
      if (!client) return;
      const endUserId = document.getElementById("endUserId").value.trim();
      const result = await client.verify({ endUserId });
      showResult(result);
    } catch (err) {
      showRawError(err);
    }
  });
</script>
